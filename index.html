<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Για τον Θέμη</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --accent: #ffb3c1;
            --text: #ffffff;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0f0c29; /* Deep midnight gradient */
            background: linear-gradient(to bottom, #24243e, #302b63, #0f0c29);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        /* Animated Bokeh Background */
        .bokeh {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        /* The Envelope Style */
        .card-container {
            position: relative;
            z-index: 10;
            perspective: 1000px;
            cursor: pointer;
        }

        .envelope {
            width: 320px;
            height: 220px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .envelope:hover {
            transform: translateY(-10px) rotateX(10deg);
            border-color: var(--accent);
        }

        .heart-seal {
            font-size: 50px;
            filter: drop-shadow(0 0 10px var(--accent));
            animation: breathe 2s infinite ease-in-out;
        }

        /* The actual Letter */
        .letter {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            width: 340px;
            padding: 40px 30px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(25px);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-align: center;
            color: white;
            opacity: 0;
            transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
        }

        .letter.active {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            margin-bottom: 10px;
            background: linear-gradient(to right, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .message {
            font-weight: 300;
            line-height: 1.6;
            letter-spacing: 0.5px;
            margin-bottom: 30px;
            color: rgba(255,255,255,0.9);
        }

        /* Kiss Button */
        #kiss-btn {
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 12px 25px;
            border-radius: 50px;
            font-family: 'Inter', sans-serif;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        #kiss-btn:hover {
            background: var(--accent);
            color: #000;
            box-shadow: 0 0 20px var(--accent);
        }

        /* Animations */
        @keyframes breathe {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; }
        }

        .kiss-particle {
            position: fixed;
            pointer-events: none;
            z-index: 100;
            font-size: 2rem;
            animation: kissAnimation 1.2s ease-out forwards;
        }

        @keyframes kissAnimation {
            0% { transform: scale(0) rotate(0deg); opacity: 1; }
            50% { transform: scale(1.5) rotate(20deg); opacity: 1; }
            100% { transform: translateY(-200px) scale(2) rotate(-20deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <canvas class="bokeh" id="bokehCanvas"></canvas>

    <div class="card-container" id="cardContainer" onclick="openMessage()">
        <div class="envelope" id="envelope">
            <div class="heart-seal">✉️</div>
        </div>
        
        <div class="letter" id="letter">
            <h1>Χρόνια Πολλά Θέμη!</h1>
            <p class="message">
                Μου λείπεις πολύ, <br>
                χαρούμενα 20 και σ' αγαπώ ❤️
            </p>
            <button id="kiss-btn" onclick="spawnKiss(event)">click για φιλάκι</button>
        </div>
    </div>

    <script>
        // Bokeh Background Animation
        const canvas = document.getElementById('bokehCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 100 + 50;
                this.speedX = Math.random() * 0.5 - 0.25;
                this.speedY = Math.random() * 0.5 - 0.25;
                this.color = `rgba(255, 179, 193, ${Math.random() * 0.05})`;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x > canvas.width) this.x = 0;
                if (this.y > canvas.height) this.y = 0;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
            }
        }

        for (let i = 0; i < 20; i++) particles.push(new Particle());

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', resize);
        resize();
        animate();

        // Interaction Logic
        function openMessage() {
            const envelope = document.getElementById('envelope');
            const letter = document.getElementById('letter');
            
            if (!letter.classList.contains('active')) {
                envelope.style.transform = "scale(0.8) translateY(100px)";
                envelope.style.opacity = "0";
                
                setTimeout(() => {
                    envelope.style.display = "none";
                    letter.classList.add('active');
                    triggerConfetti();
                }, 400);
            }
        }

        function triggerConfetti() {
            const duration = 3 * 1000;
            const end = Date.now() + duration;

            (function frame() {
                confetti({
                    particleCount: 2,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0 },
                    colors: ['#ffb3c1', '#ff4d6d']
                });
                confetti({
                    particleCount: 2,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1 },
                    colors: ['#ffb3c1', '#ff4d6d']
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());
        }

        function spawnKiss(e) {
            e.stopPropagation();
            const kiss = document.createElement('div');
            kiss.className = 'kiss-particle';
            kiss.innerText = '💋';
            kiss.style.left = e.clientX + 'px';
            kiss.style.top = e.clientY + 'px';
            document.body.appendChild(kiss);

            // Small haptic-style confetti burst
            confetti({
                particleCount: 15,
                scalar: 0.7,
                angle: 90,
                spread: 50,
                origin: { x: e.clientX / window.innerWidth, y: e.clientY / window.innerHeight },
                colors: ['#ff4d6d']
            });

            setTimeout(() => kiss.remove(), 1200);
        }
    </script>
</body>
</html>
